<body class="contact-page">
  <nav class="navbar">
    <div class="logo">MISR LEGACY</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="search.html">Search</a>

    </div>
  </nav>

  <header class="contact-header">
    <h1>Contact Us</h1>
    <p>Get in touch with us</p>
  </header>

  <main class="contact-container">
    <div class="contact-card">
      <h2>Send a Message</h2>

      <form class="contact-form">
        <label for="name">Full Name:</label>
        <input  type="text" id="name" name="name" placeholder="Enter Your name" required />

        <label for="email">Email Address:</label>
        <input  type="email" id="email" name="email" placeholder="Enter your@email.com" required />

        <label for="subject">Subject:</label>
        <input  type="text" id="subject" name="subject" placeholder="Enter subject" required />

        <label for="comment">Comment:</label>
        <textarea id="comment" name="comment" rows="5" placeholder="Write your Comment..." required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>

    <div class="contact-card">
      <h2>Visit Us</h2>

      <p><strong>Address:</strong> Grand Egyptian Museum, Giza, Egypt</p>
      <p><strong>Phone:</strong> +20 2 3531 7300</p>
      <p><strong>Email:</strong> info@gem.gov.eg</p>

      <p><strong>Working Hours:</strong></p>
      <p>Daily: 9:00 AM - 5:00 PM</p>
    </div>
  </main>

  <footer class="contact-footer">
    <p>© 2026 Your Website</p>
  </footer>

  <script src="egypt.js"></script>
</body>
